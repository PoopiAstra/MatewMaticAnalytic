<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#080808">
  <meta name="description" content="GED0055 Calculus reviewer for Modules 1–7 with detailed notes, rendered mathematics, quizzes, progress tracking, and persistent Spotify study music.">
  <title>GED0055 // Calculus Reviewer</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700;800&family=STIX+Two+Math&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=3.0.0">

  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['\\(', '\\)']],
        displayMath: [['\\[', '\\]']],
        processEscapes: true
      },
      chtml: { scale: 1.02 },
      startup: { typeset: false }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
  <div class="page-noise" aria-hidden="true"></div>
  <div class="page-glow" aria-hidden="true"></div>

  <div id="route-loader" class="route-loader is-visible" aria-live="polite" aria-label="Loading page">
    <div class="route-loader__box">
      <span class="route-loader__symbol">∫</span>
      <div class="route-loader__copy">
        <strong>LOADING WORKSPACE</strong>
        <span class="route-loader__track"><i></i></span>
      </div>
    </div>
  </div>

  <header class="site-header">
    <a class="brand" href="#home" data-view="home" aria-label="Open modules">
      <span class="brand__prompt">&gt;_</span>
      <span>GED0055</span>
    </a>

    <nav class="site-nav" aria-label="Main sections">
      <button type="button" data-view="home" data-nav-label="Modules">
        <span class="nav-icon" aria-hidden="true">▦</span><span>Modules</span>
      </button>
      <button type="button" data-view="reviewer" data-nav-label="Reviewer">
        <span class="nav-icon" aria-hidden="true">≡</span><span>Reviewer</span>
      </button>
      <button type="button" data-view="quiz" data-nav-label="Quiz">
        <span class="nav-icon" aria-hidden="true">✓</span><span>Quiz</span>
      </button>
      <button type="button" data-view="music" data-nav-label="Music">
        <span class="nav-icon" aria-hidden="true">♫</span><span>Music</span>
      </button>
    </nav>

    <div class="site-status" title="Runs entirely in your browser">
      <span></span> local mode
    </div>
  </header>

  <main id="app" tabindex="-1"></main>

  <aside id="spotify-dock" class="spotify-dock is-collapsed" aria-label="Persistent Spotify player">
    <button id="spotify-dock-toggle" class="spotify-dock__toggle" type="button" aria-expanded="false">
      <span class="equalizer" aria-hidden="true"><i></i><i></i><i></i></span>
      <span class="spotify-dock__toggle-copy">
        <small>STUDY AUDIO</small>
        <strong>Spotify player</strong>
      </span>
      <span class="spotify-dock__chevron" aria-hidden="true">⌃</span>
    </button>

    <div class="spotify-dock__body">
      <div class="spotify-dock__heading">
        <div><small>NOW PLAYING</small><strong>Spotify</strong></div>
        <button id="spotify-dock-close" type="button" aria-label="Minimize Spotify player">—</button>
      </div>
      <div id="persistent-spotify-player" class="persistent-spotify-player">
        <div class="empty-state empty-state--compact">Add a Spotify link from the Music tab.</div>
      </div>
      <p class="spotify-dock__note">Playback continues while you switch sections. Spotify controls its own volume.</p>
    </div>
  </aside>

  <noscript>
    <div class="noscript">JavaScript is required for the quizzes and reviewer navigation.</div>
  </noscript>

  <script src="data.js?v=3.0.0"></script>
  <script src="app.js?v=3.0.0"></script>
</body>
</html>
